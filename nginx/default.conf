server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # Requisições de API -> Laraavel
    location /api { 
        # Reponde direto ao navegador no Preflight (CORS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204; # Retorna "No Content" com sucesso para o navegador
        }
        
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Processamento PHP (apenas disparar location /api)
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        # O SCRIPT_FILENAME deve usar a variável do Nginx para ser dinâmico
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Todo o resto -> angular dev server
    location / {
        proxy_pass http://frontend:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        }

    location ~ /\.ht {
        deny all;
    }
}
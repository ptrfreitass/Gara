services:

  redis:
    image: redis:8.4-alpine
    container_name: gara-redis
    ports:
      - "6379:6379"
    volumes:
      - gara_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
        WWWUSER: '${WWWUSER:-1000}'
    container_name: gara-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app-network
    environment:
      OCTANE_SERVER: swoole
      SWOOLE_HTTP_COMPRESSION: "true"
      SWOOLE_HTTP_COMPRESSION_LEVEL: 6
      WWWUSER: '${WWWUSER:-1000}'
      WWWGROUP: '${WWWGROUP:-1000}'
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: gara
      DB_USERNAME: gara
      DB_PASSWORD: gara
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "octane:status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      args:
        WWWGROUP: "${WWWGROUP:-1000}"
        WWWUSER: "${WWWUSER:-1000}"
    container_name: gara-queue
    volumes:
      - ./backend:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    environment:
      WWWUSER: "${WWWUSER:-1000}"
      WWWGROUP: "${WWWGROUP:-1000}"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: gara
      DB_USERNAME: gara
      DB_PASSWORD: gara
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    entrypoint: []
    command: >
      sh -c "
      echo '🔄 Waiting for database...' &&
      until php artisan migrate:status >/dev/null 2>&1; do sleep 2; done &&
      echo '✅ Database ready!' &&
      echo '🚀 Starting Queue Worker...' &&
      php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --verbose
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[q]ueue:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: gara-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist/frontend/browser:/var/www/frontend
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ./docker/Dockerfile
      target: development
    container_name: gara-frontend
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: ["npm", "run", "start", "--", "--host", "0.0.0.0", "--poll", "30000", "--proxy-config", "proxy.conf.json"]
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: gara-db
    environment:
      POSTGRES_DB: gara
      POSTGRES_USER: gara
      POSTGRES_PASSWORD: gara
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - gara_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gara -d gara"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gara-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  gara_db_data:
    driver: local
  gara_redis_data:
    driver: local